<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" width="220" height="44">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#752BAE"/>
      <stop offset="100%" stop-color="#9B59C5"/>
    </linearGradient>
  </defs>

  <!-- Brain icon: concentric arcs emanating from bottom-left -->
  <g transform="translate(4, 38)">
    <path d="M0,0 Q0,-10 8,-16 Q16,-22 26,-22" fill="none" stroke="url(#brainGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M0,0 Q0,-14 10,-21 Q20,-28 32,-26" fill="none" stroke="url(#brainGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M0,0 Q1,-18 12,-26 Q23,-34 36,-30" fill="none" stroke="url(#brainGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M0,0 Q2,-22 14,-31 Q26,-40 38,-34" fill="none" stroke="url(#brainGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M0,0 Q3,-26 16,-35 Q29,-44 40,-36" fill="none" stroke="url(#brainGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0,0 Q4,-28 18,-37 Q32,-46 42,-37" fill="none" stroke="url(#brainGrad)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Text "BrainCore" -->
  <text x="54" y="30" font-family="Exo, sans-serif" font-weight="600" font-size="24" fill="#171D36" letter-spacing="0.5">BrainCore</text>

  <!-- Swiss flag -->
  <g transform="translate(200, 14)">
    <rect x="0" y="0" width="16" height="16" rx="1" fill="#FF0000"/>
    <rect x="7" y="3" width="2" height="10" fill="white"/>
    <rect x="3" y="7" width="10" height="2" fill="white"/>
  </g>
</svg>
